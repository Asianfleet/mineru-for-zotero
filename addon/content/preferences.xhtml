<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <vbox>
    <html:h3
      for="zotero-prefpane-__addonRef__-api-key"
      data-l10n-id="pref-api-key"
    ></html:h3>
    <html:input
      type="password"
      id="zotero-prefpane-__addonRef__-api-key"
      preference="apiKey"
    ></html:input>
    <html:div data-l10n-id="pref-api-key-help"></html:div>
  </vbox>
  <vbox>
    <html:h3 data-l10n-id="pref-api-source-title"></html:h3>
    <radiogroup
      id="zotero-prefpane-__addonRef__-parse-source"
      orient="horizontal"
      native="true"
      preference="parseSource"
    >
      <radio
        data-l10n-id="pref-api-source-online"
        value="online"
      />
      <radio
        data-l10n-id="pref-api-source-local"
        value="local"
      />
    </radiogroup>
    <html:div data-l10n-id="pref-api-source-help"></html:div>
  </vbox>
  <vbox>
    <html:h3 data-l10n-id="pref-parse-mode-title"></html:h3>
    <radiogroup
      id="zotero-prefpane-__addonRef__-parse-mode"
      orient="horizontal"
      native="true"
      preference="parseMode"
    >
      <radio
        data-l10n-id="pref-parse-mode-precise"
        value="precise"
      />
      <radio
        data-l10n-id="pref-parse-mode-lite"
        value="lite"
      />
    </radiogroup>
    <html:div data-l10n-id="pref-parse-mode-help"></html:div>
  </vbox>
  <vbox>
    <html:h3
      for="zotero-prefpane-__addonRef__-local-api-base-url"
      data-l10n-id="pref-local-api-base-url"
    ></html:h3>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-local-api-base-url"
      preference="localApiBaseURL"
    ></html:input>
    <html:div data-l10n-id="pref-local-api-base-url-help"></html:div>
  </vbox>
  <vbox>
    <html:label>
      <html:input
        type="checkbox"
        id="zotero-prefpane-__addonRef__-save-images"
        preference="saveImages"
      ></html:input>
      <html:span data-l10n-id="pref-save-images"></html:span>
    </html:label>
    <html:div data-l10n-id="pref-save-images-help"></html:div>
  </vbox>
  <vbox>
    <html:h3 data-l10n-id="pref-data-folder-title"></html:h3>
    <hbox>
      <html:button
        id="__addonRef__-open-data-folder"
        data-l10n-id="pref-open-data-folder"
      ></html:button>
    </hbox>
    <html:div id="__addonRef__-data-folder-path"></html:div>
    <html:div id="__addonRef__-parsed-count"></html:div>
  </vbox>
</groupbox>
<vbox>
  <html:h3 data-l10n-id="pref-about-title"></html:h3>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
  <html:div>
    <html:a
      id="__addonRef__-github-link"
      href="https://github.com/Asianfleet/mineru-for-zotero"
      >Github</html:a
    >
    <html:span> · </html:span>
    <html:a id="__addonRef__-mineru-link" href="https://mineru.net/"
      >MinerU</html:a
    >
  </html:div>
</vbox>
